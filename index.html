<style>
:root {
  --bg:#080c14; --bg2:#0d1420; --bg3:#121a2a;
  --card:#0f1928; --card2:#162135;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --gold:#f0b429; --gold2:#d99f1e;
  --teal:#00c9a7; --red:#f05252; --green:#22c55e; --blue:#60a5fa;
  --text:#e8edf5; --muted:#6b7a99; --muted2:#4a5568;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}

/* NAV */
nav{background:rgba(13,20,32,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;}
nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--teal),transparent);}
.logo{font-family:'Bebas Neue',sans-serif;display:flex;flex-direction:column;line-height:1;text-decoration:none;}
.logo-main{font-size:1.35rem;letter-spacing:3px;color:var(--gold);}
.logo-sub{font-size:0.68rem;letter-spacing:4px;color:var(--teal);font-family:'Inter',sans-serif;font-weight:300;}
.nav-right{display:flex;align-items:center;gap:.75rem;}
.nav-user{font-size:.8rem;color:var(--muted);}
.nav-user strong{color:var(--text);font-weight:500;}

/* BUTTONS */
.btn{padding:.5rem 1.25rem;border-radius:8px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:.875rem;font-weight:500;transition:all .2s;}
.btn-gold{background:var(--gold);color:#000;font-weight:600;}
.btn-gold:hover{background:var(--gold2);}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text);}
.btn-outline:hover{background:var(--bg3);border-color:var(--gold);color:var(--gold);}
.btn-sm{padding:.3rem .85rem;font-size:.78rem;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* PAGES */
.page{display:none;}
.page.active{display:block;}
#auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(240,180,41,.08) 0%,transparent 70%),var(--bg);}

/* AUTH BOX */
.auth-box{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:2.5rem;width:100%;max-width:420px;}
.auth-box h1{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--gold);text-align:center;letter-spacing:2px;margin-bottom:.25rem;}
.auth-box p{text-align:center;color:var(--muted);font-size:.875rem;margin-bottom:2rem;}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.5rem;}
.auth-tab{flex:1;padding:.75rem;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;font-family:'Inter',sans-serif;transition:all .2s;}
.auth-tab.active{color:var(--gold);border-bottom:2px solid var(--gold);}
.form-group{margin-bottom:1rem;}
.form-group label{display:block;font-size:.72rem;color:var(--muted);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:1px;font-weight:500;}
.form-group input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:.7rem 1rem;color:var(--text);font-size:.9rem;outline:none;transition:all .2s;font-family:'Inter',sans-serif;}
.form-group input:focus{border-color:var(--gold);}
.err-msg{border-radius:10px;padding:.75rem;font-size:.82rem;margin-bottom:1rem;display:none;border:1px solid rgba(240,82,82,.3);background:rgba(240,82,82,.08);color:var(--red);}

/* APP */
#app-page{min-height:100vh;}
.app-inner{max-width:1200px;margin:0 auto;padding:1.5rem;}

/* TABS */
.tabs{display:flex;margin-bottom:2rem;border-bottom:1px solid var(--border);overflow-x:auto;}
.tab{padding:.75rem 1.4rem;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.875rem;font-weight:500;border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px;white-space:nowrap;font-family:'Inter',sans-serif;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;}
.card-title{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:600;margin-bottom:1rem;color:var(--text);}

/* MATCH CARDS */
.match-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:.875rem;transition:all .2s;position:relative;overflow:hidden;}
.match-card:hover{border-color:rgba(240,180,41,.25);background:var(--card2);}
.live-card{border-color:rgba(240,82,82,.35)!important;}

/* BADGES */
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;}
.b-live{background:rgba(240,82,82,.15);color:var(--red);animation:pulse 1.8s infinite;}
.b-done{background:rgba(255,255,255,.06);color:var(--muted);}
.b-up{background:rgba(96,165,250,.12);color:var(--blue);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* LEADERBOARD */
.lb-row{display:flex;align-items:center;gap:1rem;padding:.9rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:.5rem;}
.lb-row:hover{background:var(--card2);}
.lb-row-gold{border-color:rgba(240,180,41,.4);}

/* PLAYER GRID */
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.5rem;margin-top:.5rem;}
.player-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.5rem .75rem;color:var(--text);font-size:.8rem;cursor:pointer;transition:all .15s;text-align:left;font-family:'Inter',sans-serif;}
.player-btn:hover{border-color:var(--gold);}
.player-btn.selected{background:rgba(240,180,41,.12);border-color:var(--gold);color:var(--gold);font-weight:500;}
.player-btn.cap-sel{background:rgba(240,180,41,.2);border-color:var(--gold);outline:2px solid var(--gold);}
.player-btn.vc-sel{background:rgba(0,201,167,.12);border-color:var(--teal);outline:2px solid var(--teal);}
.player-btn:disabled{opacity:.35;cursor:not-allowed;}

/* SQUADS */
.squad-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;}
.squad-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;}
.squad-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:.75rem;}
.squad-pill{font-size:.72rem;padding:2px 7px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);}

/* OVERLAYS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;overflow-y:auto;padding:2rem 1rem;justify-content:center;}
.overlay.open{display:flex;}
.ov-box{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:1.5rem;width:100%;max-width:700px;position:relative;align-self:flex-start;}
.ov-close{position:absolute;top:1rem;right:1rem;background:var(--bg3);border:none;color:var(--text);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1.1rem;}

/* SCORECARD */
.inn-title{font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:600;color:var(--muted);padding-bottom:.3rem;border-bottom:1px solid var(--border);margin-bottom:.5rem;display:flex;justify-content:space-between;}
table.sc-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:1rem;}
.sc-table th{text-align:left;color:var(--muted);font-weight:400;padding:3px 4px;font-size:11px;border-bottom:1px solid var(--border);}
.sc-table td{padding:4px;}
.sc-table .r{text-align:right;}
.sc-table .hl{font-weight:600;}

/* PTS ROW */
.pts-row{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--border);font-size:.82rem;}
.pts-row:last-child{border:none;}
.pts-pos{color:var(--green);font-weight:600;}
.pts-neg{color:var(--red);font-weight:600;}

/* MISC */
.status-bar{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.empty-state{text-align:center;padding:3rem;color:var(--muted);font-size:.9rem;}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.step-pill{display:inline-flex;align-items:center;gap:.4rem;font-size:.72rem;padding:3px 10px;border-radius:20px;font-weight:600;margin-right:.4rem;}
.step-pill.active{background:rgba(240,180,41,.2);color:var(--gold);border:1px solid rgba(240,180,41,.4);}
.step-pill.done{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);}
.step-pill.inactive{background:var(--bg3);color:var(--muted);border:1px solid var(--border);}
@media(max-width:640px){.grid-2{grid-template-columns:1fr;}.player-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));}}
</style>
</head>

<!-- ── AUTH ── -->

<!-- ── APP ── -->

    </div>

    <!-- My Teams -->
    <div id="tab-myteams" style="display:none">
      <div id="myteams-list"></div>
    </div>

    <!-- Squads -->
    <div id="tab-squads" style="display:none">
      <div class="squad-grid" id="squads-grid"></div>
    </div>
  </div>
</div>

<!-- ── SCORECARD OVERLAY ── -->
<div id="sc-overlay" class="overlay">

var currentUser=null, matches=[], matchFilter='all', activeTab='matches';

// ── HELPERS ───────────────────────────────────────────────────────
function normName(n){return(n||'').toLowerCase().replace(/[^a-z]/g,'');}

function teamColor(name){
  var keys=Object.keys(SQUADS);
  for(var i=0;i<keys.length;i++){
    var s=SQUADS[keys[i]];
    if(!name) continue;
    if(s.name===name||name.indexOf(keys[i])>=0||keys[i]===name) return s.color;
    // fuzzy: last word match
    var lastWord=s.name.split(' ').slice(-1)[0].toLowerCase();
    if(name.toLowerCase().indexOf(lastWord)>=0) return s.color;
  }
  return 'var(--text)';
}

function getTeamSquad(teamName){
  if(!teamName) return null;
  var keys=Object.keys(SQUADS), nl=teamName.toLowerCase();
  for(var i=0;i<keys.length;i++){
    var s=SQUADS[keys[i]];
    if(s.name===teamName) return {code:keys[i],name:s.name,color:s.color,players:s.players};
    var words=s.name.toLowerCase().split(' ');
    for(var j=0;j<words.length;j++){
      if(words[j].length>3 && nl.indexOf(words[j])>=0) return {code:keys[i],name:s.name,color:s.color,players:s.players};
    }
  }
  return null;
}

function showErr(msg){var el=document.getElementById('err-msg');el.textContent=msg;el.style.display='block';}

function showPage(pid){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');p.style.display='none';});
  var el=document.getElementById(pid);el.classList.add('active');
  el.style.display=(pid==='auth-page')?'flex':'block';
}

// ── AUTH ──────────────────────────────────────────────────────────
function switchAuthTab(mode){
  authMode=mode;
  document.getElementById('tab-login').classList.toggle('active',mode==='login');
  document.getElementById('tab-register').classList.toggle('active',mode==='register');
  document.getElementById('name-group').style.display=mode==='register'?'block':'none';
  document.getElementById('auth-btn').textContent=mode==='login'?'Sign In':'Create Account';
}

function doAuth(){
  var email=document.getElementById('auth-email').value.trim();
  var pass=document.getElementById('auth-pass').value;
  var name=document.getElementById('auth-name').value.trim();
  document.getElementById('err-msg').style.display='none';
  if(!email){showErr('Please enter your email');return;}
  if(!pass){showErr('Please enter your password');return;}
  var btn=document.getElementById('auth-btn');
  btn.disabled=true;btn.textContent='Please wait…';
  var ERRORS={'auth/user-not-found':'No account found. Try Register.','auth/wrong-password':'Incorrect password.','auth/invalid-email':'Invalid email.','auth/invalid-credential':'Email or password is incorrect.','auth/too-many-requests':'Too many attempts. Try later.','auth/network-request-failed':'Network error.','auth/email-already-in-use':'Account exists. Try Sign In.','auth/operation-not-allowed':'Email/Password not enabled in Firebase.'};
  var timedOut=false;
  var timeout=setTimeout(function(){timedOut=true;showErr('Timed out. Check connection.');btn.disabled=false;btn.textContent=authMode==='login'?'Sign In':'Create Account';},15000);
  function onOk(user){if(timedOut)return;clearTimeout(timeout);currentUser=user;btn.disabled=false;btn.textContent=authMode==='login'?'Sign In':'Create Account';document.getElementById('nav-name').textContent=user.displayName||user.email.split('@')[0];showPage('app-page');loadMyMatchTeams(function(){startRefresh();renderSquads();renderMyTeams();});}
  function onErr(e){if(timedOut)return;clearTimeout(timeout);showErr(ERRORS[e.code]||e.message);btn.disabled=false;btn.textContent=authMode==='login'?'Sign In':'Create Account';}
  if(authMode==='login'){
    auth.signInWithEmailAndPassword(email,pass).then(function(c){onOk(c.user);}).catch(onErr);
  } else {
    if(!name){clearTimeout(timeout);showErr('Please enter a display name');btn.disabled=false;btn.textContent='Create Account';return;}
    auth.createUserWithEmailAndPassword(email,pass).then(function(c){
      return c.user.updateProfile({displayName:name}).then(function(){
        return db.collection('users').doc(c.user.uid).set({name:name,email:email,createdAt:new Date().toISOString()});
      }).then(function(){onOk(c.user);});
    }).catch(onErr);
  }
}

// ── SCORES ────────────────────────────────────────────────────────
function fetchScores(){
  fetch('/api/scores').then(function(r){if(!r.ok)throw new Error(r.status);return r.json();}).then(function(d){
    matches=d.matches||[];
    document.getElementById('live-count').textContent=matches.filter(function(m){return m.status==='live';}).length;
    document.getElementById('last-updated').textContent='Updated '+new Date(d.fetchedAt||Date.now()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    if(d.error) console.warn('API:',d.error);
    updateAllMatchPoints();
    if(activeTab==='matches') renderMatches();
    if(activeTab==='leaderboard') renderTournamentLB();
    if(activeTab==='myteams') renderMyTeams();
  }).catch(function(e){console.warn('Fetch:',e.message);});
}

function startRefresh(){
  stopRefresh();countdown=900;fetchScores();
  timer=setInterval(function(){
    countdown--;
    var el=document.getElementById('refresh-countdown');
    if(el){var m=Math.floor(countdown/60),s=countdown%60;el.textContent='Refresh in '+m+':'+(s<10?'0':'')+s;}
    if(countdown<=0){countdown=900;fetchScores();}
  },1000);
}
function stopRefresh(){clearInterval(timer);}

// ── FANTASY POINTS ────────────────────────────────────────────────
function getPlayerPts(name, matchId){
  var match=matches.find(function(m){return m.id===matchId;});
  if(!match||!match.playerPoints) return 0;
  return match.playerPoints[normName(name)]||0;
}

function calcTeamPts(players, captain, vc, matchId){
  var total=0;
  (players||[]).forEach(function(p){
    var pts=getPlayerPts(p,matchId);
    if(p===captain) total+=pts*2;
    else if(p===vc) total+=pts*1.5;
    else total+=pts;
  });
  return Math.round(total);
}

// ── FIRESTORE TEAMS ───────────────────────────────────────────────
function loadMyMatchTeams(cb){
  if(!currentUser){cb&&cb();return;}
  db.collection('matchTeams').where('uid','==',currentUser.uid).get().then(function(snap){
    myMatchTeams={};
    snap.forEach(function(doc){var d=doc.data();myMatchTeams[d.matchId]=d;});
    cb&&cb();
  }).catch(function(){myMatchTeams={};cb&&cb();});
}

function saveMatchTeam(matchId, name, players, captain, vc, cb){
  if(!currentUser) return;
  var pts=calcTeamPts(players,captain,vc,matchId);
  var docId=matchId+'_'+currentUser.uid;
  var data={matchId:matchId,uid:currentUser.uid,ownerName:currentUser.displayName||currentUser.email,ownerEmail:currentUser.email,teamName:name||'My Team',players:players,captain:captain,viceCaptain:vc,totalPoints:pts,createdAt:(myMatchTeams[matchId]&&myMatchTeams[matchId].createdAt)||new Date().toISOString(),lastUpdated:new Date().toISOString()};
  db.collection('matchTeams').doc(docId).set(data).then(function(){myMatchTeams[matchId]=data;cb&&cb();}).catch(function(e){alert('Save failed: '+e.message);});
}

function updateAllMatchPoints(){
  if(!currentUser) return;
  Object.keys(myMatchTeams).forEach(function(matchId){
    var team=myMatchTeams[matchId];
    if(!team||!team.players) return;
    var newPts=calcTeamPts(team.players,team.captain,team.viceCaptain,matchId);
    if(newPts!==team.totalPoints){
      db.collection('matchTeams').doc(matchId+'_'+currentUser.uid)
        .update({totalPoints:newPts,lastUpdated:new Date().toISOString()})
        .then(function(){myMatchTeams[matchId].totalPoints=newPts;})
        .catch(function(e){console.warn(e);});
    }
  });
}

// ── TABS ──────────────────────────────────────────────────────────
function switchMainTab(tab){
  activeTab=tab;
  ['matches','leaderboard','myteams','squads'].forEach(function(t){
    document.getElementById('tab-'+t).style.display=t===tab?'block':'none';
  });
  document.querySelectorAll('#main-tabs .tab').forEach(function(btn){btn.classList.toggle('active',btn.dataset.tab===tab);});
  if(tab==='matches') renderMatches();
  if(tab==='leaderboard') renderTournamentLB();
  if(tab==='myteams') renderMyTeams();
  if(tab==='squads') renderSquads();
}

function switchMatchFilter(filter){
  matchFilter=filter;
  document.querySelectorAll('#match-filter-tabs .tab').forEach(function(btn){btn.classList.toggle('active',btn.dataset.filter===filter);});
  renderMatches();
}

// ── RENDER MATCHES ────────────────────────────────────────────────
function renderMatches(){
  var el=document.getElementById('matches-list');
  var list=matchFilter==='all'?matches:matches.filter(function(m){return m.status===matchFilter;});
  if(!list.length){el.innerHTML='<div class="empty-state">No '+matchFilter+' matches found.</div>';return;}
  var html='';
  list.forEach(function(m,i){
    var idx=matches.indexOf(m);
    var myTeam=myMatchTeams[m.id];
    var hasTeam=myTeam&&myTeam.players&&myTeam.players.length;
    var isLive=m.status==='live', isUp=m.status==='upcoming';
    var myPts=hasTeam?calcTeamPts(myTeam.players,myTeam.captain,myTeam.viceCaptain,m.id):null;
    var badge=isLive?'<span class="badge b-live">● LIVE</span>':isUp?'<span class="badge b-up">UPCOMING</span>':'<span class="badge b-done">RESULT</span>';
    var c1=teamColor(m.t1),c2=teamColor(m.t2);

    html+='<div class="match-card'+(isLive?' live-card':'')+'">';
    // header
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem">';
    html+='<span style="font-size:.72rem;color:var(--muted)">'+( m.date||'')+(m.venue?' · '+m.venue:'')+'</span>'+badge+'</div>';
    // teams — clicking opens scorecard
    html+='<div style="display:flex;align-items:center;cursor:pointer" onclick="openSc('+idx+')">';
    html+='<div style="flex:1"><div style="font-family:Rajdhani,sans-serif;font-weight:600;color:'+c1+'">'+m.t1+'</div>';
    if(!isUp) html+='<div style="font-size:1.5rem;font-weight:700;letter-spacing:-.5px">'+(m.s1||'—')+'</div><div style="font-size:.72rem;color:var(--muted)">'+(m.o1?'('+m.o1+' ov)':'')+'</div>';
    html+='</div><div style="color:var(--muted);font-size:.75rem;padding:0 .75rem">vs</div>';
    html+='<div style="flex:1;text-align:right"><div style="font-family:Rajdhani,sans-serif;font-weight:600;color:'+c2+'">'+m.t2+'</div>';
    if(!isUp) html+='<div style="font-size:1.5rem;font-weight:700;letter-spacing:-.5px">'+(m.s2||'—')+'</div><div style="font-size:.72rem;color:var(--muted)">'+(m.o2?'('+m.o2+' ov)':'')+'</div>';
    html+='</div></div>';
    if(m.result) html+='<div style="font-size:.78rem;color:var(--muted);margin-top:.4rem;border-top:1px solid var(--border);padding-top:.4rem">'+m.result+'</div>';

    // action row
    html+='<div style="display:flex;gap:.5rem;margin-top:.75rem;border-top:1px solid var(--border);padding-top:.75rem;align-items:center">';
    if(hasTeam&&myPts!==null){
      html+='<div style="background:rgba(240,180,41,.08);border:1px solid rgba(240,180,41,.2);border-radius:8px;padding:.3rem .75rem;min-width:70px">';
      html+='<div style="font-size:.6rem;color:var(--muted);text-transform:uppercase">My Pts</div>';
      html+='<div style="font-size:1.1rem;font-weight:700;color:var(--gold)">'+myPts+'</div></div>';
    }
    html+='<div style="flex:1;display:flex;gap:.4rem;justify-content:flex-end">';
    if(isUp){
      html+='<button class="btn '+(hasTeam?'btn-outline':'btn-gold')+' btn-sm" onclick="openPicker(\''+m.id+'\')">'+(hasTeam?'✎ Edit':'⚡ Join')+'</button>';
    }
    if(hasTeam){
      html+='<button class="btn btn-outline btn-sm" onclick="openMatchLB(\''+m.id+'\')">🏆 LB</button>';
    }
    html+='<button class="btn btn-outline btn-sm" onclick="openSc('+idx+')">📋 Card</button>';
    html+='</div></div>';
    html+='</div>';
  });
  el.innerHTML=html;
}

// ── SCORECARD ─────────────────────────────────────────────────────
function openSc(idx){
  var m=matches[idx]; if(!m) return;
  var html='<div style="margin-bottom:1rem"><div style="font-family:Rajdhani,sans-serif;font-size:1.15rem;font-weight:600">'+(m.f1||m.t1)+' vs '+(m.f2||m.t2)+'</div>';
  html+='<div style="font-size:.78rem;color:var(--muted);margin-top:2px">'+(m.date||'')+' · '+(m.venue||'')+'</div>';
  if(m.result) html+='<div style="font-size:.82rem;color:var(--teal);margin-top:4px">'+m.result+'</div></div>';
  var inn=m.scorecard||[];
  if(!inn.length) html+='<div style="color:var(--muted);padding:1rem 0">'+(m.status==='upcoming'?"Match hasn't started yet.":"Scorecard loading…")+'</div>';
  for(var i=0;i<inn.length;i++){
    var inning=inn[i];
    html+='<div style="margin-bottom:1.25rem"><div class="inn-title"><span>'+(inning.inning||'Innings')+'</span><span>'+(inning.totalRuns||'')+'/'+(inning.totalWickets||'')+' ('+(inning.totalOvers||'')+' ov)</span></div>';
    html+='<table class="sc-table"><thead><tr><th>Batter</th><th>Dismissal</th><th class="r">R</th><th class="r">B</th><th class="r">4s</th><th class="r">6s</th><th class="r">SR</th></tr></thead><tbody>';
    (inning.batting||[]).forEach(function(b){
      var sr=b.b>0?((b.r/b.b)*100).toFixed(1):'—';
      html+='<tr><td class="hl">'+(b.batsman&&b.batsman.name?b.batsman.name:(b.name||''))+'</td><td style="color:var(--muted)">'+(b.dismissal||b.how_out||'not out')+'</td><td class="r hl">'+(b.r||0)+'</td><td class="r">'+(b.b||0)+'</td><td class="r">'+(b['4s']||0)+'</td><td class="r">'+(b['6s']||0)+'</td><td class="r">'+sr+'</td></tr>';
    });
    html+='</tbody></table>';
    html+='<table class="sc-table" style="margin-top:.5rem"><thead><tr><th>Bowler</th><th class="r">O</th><th class="r">R</th><th class="r">W</th><th class="r">Econ</th></tr></thead><tbody>';
    (inning.bowling||[]).forEach(function(bw){
      var eco=bw.o>0?(bw.r/bw.o).toFixed(2):'—';
      html+='<tr><td class="hl">'+(bw.bowler&&bw.bowler.name?bw.bowler.name:(bw.name||''))+'</td><td class="r">'+(bw.o||0)+'</td><td class="r">'+(bw.r||0)+'</td><td class="r hl">'+(bw.w||0)+'</td><td class="r">'+eco+'</td></tr>';
    });
    html+='</tbody></table></div>';
  }
  document.getElementById('sc-content').innerHTML=html;
  document.getElementById('sc-overlay').classList.add('open');
}

// ── TEAM PICKER ───────────────────────────────────────────────────
function openPicker(matchId){
  var match=matches.find(function(m){return m.id===matchId;});
  if(!match) return;
  pickerMatchId=matchId;
  var ex=myMatchTeams[matchId];
  pickerSel=ex?ex.players.slice():[];
  pickerCaptain=ex?ex.captain:null;
  pickerVC=ex?ex.viceCaptain:null;
  pickerName=ex?ex.teamName:'';
  pickerStep=pickerSel.length===11?'captain':'players';
  renderPicker();
  document.getElementById('picker-overlay').classList.add('open');
}

function closePicker(){document.getElementById('picker-overlay').classList.remove('open');}

function togglePickerPlayer(name){
  var i=pickerSel.indexOf(name);
  if(i>=0){
    pickerSel.splice(i,1);
    if(pickerCaptain===name) pickerCaptain=null;
    if(pickerVC===name) pickerVC=null;
    pickerStep='players';
  } else {
    if(pickerSel.length>=11) return;
    // Max 7 from one team
    var match=matches.find(function(m){return m.id===pickerMatchId;});
    if(match){
      var sq1=getTeamSquad(match.t1),sq2=getTeamSquad(match.t2);
      if(sq1&&sq1.players.indexOf(name)>=0){
        var c1=pickerSel.filter(function(p){return sq1.players.indexOf(p)>=0;}).length;
        if(c1>=7) return;
      }
      if(sq2&&sq2.players.indexOf(name)>=0){
        var c2=pickerSel.filter(function(p){return sq2.players.indexOf(p)>=0;}).length;
        if(c2>=7) return;
      }
    }
    pickerSel.push(name);
  }
  if(pickerSel.length===11) pickerStep='captain';
  renderPicker();
}

function setCapOrVC(name){
  if(pickerSel.indexOf(name)<0) return;
  if(pickerCaptain===name){pickerCaptain=null;}
  else if(pickerVC===name){pickerVC=null;}
  else if(!pickerCaptain){pickerCaptain=name;}
  else if(!pickerVC&&name!==pickerCaptain){pickerVC=name;}
  else{// reassign: tap replaces vc
    pickerVC=name;
  }
  renderPicker();
}

function savePickerTeam(){
  if(pickerSel.length!==11||!pickerCaptain||!pickerVC) return;
  var name=(document.getElementById('picker-name-input')||{}).value;
  name=(name||'').trim()||'My Team';
  saveMatchTeam(pickerMatchId,name,pickerSel,pickerCaptain,pickerVC,function(){
    closePicker();
    renderMatches();
    if(activeTab==='myteams') renderMyTeams();
    if(activeTab==='leaderboard') renderTournamentLB();
  });
}

function renderPicker(){
  var match=matches.find(function(m){return m.id===pickerMatchId;});
  if(!match){document.getElementById('picker-content').innerHTML='<div class="empty-state">Match not found.</div>';return;}
  var sq1=getTeamSquad(match.t1),sq2=getTeamSquad(match.t2);
  var sel=pickerSel,step=pickerStep;
  var html='';

  // Header + steps
  html+='<div style="margin-bottom:1rem">';
  html+='<div style="font-family:Rajdhani,sans-serif;font-size:1.2rem;font-weight:700">'+match.t1+' vs '+match.t2+'</div>';
  html+='<div style="font-size:.75rem;color:var(--muted);margin-bottom:.75rem">'+(match.date||'')+(match.venue?' · '+match.venue:'')+'</div>';
  html+='<span class="step-pill '+(step==='players'?'active':'done')+'">① Players</span>';
  html+='<span class="step-pill '+(step==='captain'?'active':step==='done'?'done':'inactive')+'">② Captain & VC</span>';
  html+='</div>';

  if(step==='players'){
    // Count bar
    var cnt1=sq1?sel.filter(function(p){return sq1.players.indexOf(p)>=0;}).length:0;
    var cnt2=sq2?sel.filter(function(p){return sq2.players.indexOf(p)>=0;}).length:0;
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;background:var(--bg3);padding:.5rem .75rem;border-radius:8px">';
    html+='<span style="font-size:.78rem"><span style="color:'+(sq1?sq1.color:'var(--text)')+'">'+match.t1.split(' ').pop()+': '+cnt1+'</span></span>';
    html+='<span style="font-size:.9rem;font-weight:600;color:'+(sel.length===11?'var(--green)':'var(--text)')+'">'+sel.length+'/11</span>';
    html+='<span style="font-size:.78rem"><span style="color:'+(sq2?sq2.color:'var(--text)')+'">'+match.t2.split(' ').pop()+': '+cnt2+'</span></span>';
    html+='</div>';
    html+='<div style="font-size:.7rem;color:var(--muted2);margin-bottom:.75rem">Max 7 players from one team</div>';

    // Team 1 players
    if(sq1){
      html+='<div style="margin-bottom:.75rem"><div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.4rem">';
      html+='<div style="width:10px;height:10px;border-radius:50%;background:'+sq1.color+'"></div>';
      html+='<span style="font-family:Rajdhani,sans-serif;font-weight:600">'+sq1.name+'</span></div>';
      html+='<div class="player-grid">';
      sq1.players.forEach(function(p){
        var isSel=sel.indexOf(p)>=0;
        var pts=getPlayerPts(p,pickerMatchId);
        var dis=(!isSel&&(sel.length>=11||cnt1>=7))?'disabled':'';
        html+='<button class="player-btn'+(isSel?' selected':'')+'" onclick="togglePickerPlayer(\''+p.replace(/'/g,"\\'")+'\')" '+dis+'>';
        html+=p;
        if(pts) html+='<span style="font-size:.65rem;color:'+(isSel?'var(--gold)':'var(--muted)')+';display:block">'+pts+' pts</span>';
        html+='</button>';
      });
      html+='</div></div>';
    }

    // Team 2 players
    if(sq2){
      html+='<div style="margin-bottom:1rem"><div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.4rem">';
      html+='<div style="width:10px;height:10px;border-radius:50%;background:'+sq2.color+'"></div>';
      html+='<span style="font-family:Rajdhani,sans-serif;font-weight:600">'+sq2.name+'</span></div>';
      html+='<div class="player-grid">';
      sq2.players.forEach(function(p){
        var isSel=sel.indexOf(p)>=0;
        var pts=getPlayerPts(p,pickerMatchId);
        var dis=(!isSel&&(sel.length>=11||cnt2>=7))?'disabled':'';
        html+='<button class="player-btn'+(isSel?' selected':'')+'" onclick="togglePickerPlayer(\''+p.replace(/'/g,"\\'")+'\')" '+dis+'>';
        html+=p;
        if(pts) html+='<span style="font-size:.65rem;color:'+(isSel?'var(--gold)':'var(--muted)')+';display:block">'+pts+' pts</span>';
        html+='</button>';
      });
      html+='</div></div>';
    }

    if(!sq1&&!sq2) html+='<div class="empty-state">Squad data not found for these teams.</div>';

    html+='<div style="position:sticky;bottom:0;background:var(--card);padding:.75rem 0;border-top:1px solid var(--border)">';
    html+='<button class="btn btn-gold" style="width:100%" '+(sel.length===11?'':'disabled')+' onclick="pickerStep=\'captain\';renderPicker()">'+(sel.length===11?'Next: Pick Captain & VC →':'Select '+(11-sel.length)+' more')+'</button>';
    html+='</div>';

  } else {
    // Captain & VC step
    html+='<div style="background:var(--bg3);border-radius:10px;padding:.75rem;margin-bottom:1rem">';
    html+='<div style="font-size:.72rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:.5rem;color:var(--muted)">Tap to assign  <span style="color:var(--gold)">C (2×)</span>  then  <span style="color:var(--teal)">VC (1.5×)</span></div>';
    html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.4rem">';
    sel.forEach(function(p){
      var isCap=pickerCaptain===p,isVC=pickerVC===p;
      var pts=getPlayerPts(p,pickerMatchId);
      var multiplier=isCap?2:isVC?1.5:1;
      var effPts=Math.round(pts*multiplier);
      html+='<button class="player-btn'+(isCap?' cap-sel':isVC?' vc-sel':'')+'" onclick="setCapOrVC(\''+p.replace(/'/g,"\\'")+'\')">'+p;
      html+='<span style="display:flex;justify-content:space-between;margin-top:3px">';
      html+='<span style="font-size:.65rem;color:var(--muted)">'+effPts+(effPts!==pts?' (×'+multiplier+')':'')+' pts</span>';
      html+='<span style="font-size:.65rem;font-weight:700;color:'+(isCap?'var(--gold)':isVC?'var(--teal)':'transparent')+'">'+(isCap?'C':isVC?'VC':'C')+'</span>';
      html+='</span></button>';
    });
    html+='</div>';
    if(!pickerCaptain) html+='<div style="font-size:.72rem;color:var(--muted);margin-top:.5rem">👆 Tap a player to set as Captain</div>';
    else if(!pickerVC) html+='<div style="font-size:.72rem;color:var(--teal);margin-top:.5rem">👆 Now tap another player to set as Vice Captain</div>';
    html+='</div>';

    // Team name
    html+='<div class="form-group"><label>Team Name</label>';
    html+='<input type="text" id="picker-name-input" value="'+(pickerName||'').replace(/"/g,'&quot;')+'" placeholder="e.g. Super Squad" style="background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:.6rem 1rem;color:var(--text);width:100%;outline:none;font-family:Inter,sans-serif;font-size:.875rem"></div>';

    var canSave=sel.length===11&&pickerCaptain&&pickerVC;
    html+='<button class="btn btn-gold" style="width:100%;padding:.75rem" '+(canSave?'':'disabled')+' onclick="savePickerTeam()">'+(canSave?'Save Team ✓':'Select Captain & Vice Captain')+'</button>';
    html+='<button class="btn btn-outline" style="width:100%;margin-top:.5rem" onclick="pickerStep=\'players\';renderPicker()">← Back to Player Selection</button>';
  }

  document.getElementById('picker-content').innerHTML=html;
}

// ── MATCH LEADERBOARD ─────────────────────────────────────────────
function openMatchLB(matchId){
  var match=matches.find(function(m){return m.id===matchId;});
  document.getElementById('match-lb-content').innerHTML='<div class="empty-state"><span class="spinner"></span>Loading…</div>';
  document.getElementById('match-lb-overlay').classList.add('open');
  db.collection('matchTeams').where('matchId','==',matchId).orderBy('totalPoints','desc').limit(50).get().then(function(snap){
    var html='';
    if(match){
      html+='<div style="margin-bottom:1rem"><div style="font-family:Rajdhani,sans-serif;font-size:1.2rem;font-weight:700">'+match.t1+' vs '+match.t2+'</div>';
      html+='<div style="font-size:.75rem;color:var(--teal)">Match Leaderboard</div></div>';
    }
    if(snap.empty){html+='<div class="empty-state">No teams entered for this match yet.</div>';}
    else{
      var rank=0,medals=['🥇','🥈','🥉'];
      snap.forEach(function(doc){
        var t=doc.data(),isMe=t.uid===(currentUser&&currentUser.uid);rank++;
        html+='<div class="lb-row'+(rank===1?' lb-row-gold':'')+'" '+(isMe?'style="border-color:rgba(0,201,167,.4);background:rgba(0,201,167,.04)"':'')+'>';
        html+='<div style="font-size:1.1rem;min-width:2rem;text-align:center">'+(medals[rank-1]||rank)+'</div>';
        html+='<div style="flex:1"><div style="font-weight:600;font-size:.95rem">'+(t.teamName||'Unnamed')+(isMe?' <span style="font-size:.7rem;color:var(--teal)">(You)</span>':'')+'</div>';
        html+='<div style="font-size:.75rem;color:var(--muted)">'+(t.ownerName||t.ownerEmail||'');
        if(t.captain) html+=' · C: '+t.captain.split(' ').pop();
        if(t.viceCaptain) html+=' · VC: '+t.viceCaptain.split(' ').pop();
        html+='</div></div>';
        html+='<div style="text-align:right"><div style="font-family:Rajdhani,sans-serif;font-size:1.4rem;font-weight:700;color:'+(rank===1?'var(--gold)':'var(--text)')+'">'+(t.totalPoints||0).toLocaleString()+'</div>';
        html+='<div style="font-size:.7rem;color:var(--muted)">pts</div></div></div>';
      });
    }
    document.getElementById('match-lb-content').innerHTML=html;
  }).catch(function(e){document.getElementById('match-lb-content').innerHTML='<div style="color:var(--red);padding:1rem">Error: '+e.message+'<br><small>Add Firestore index: matchTeams → matchId ASC, totalPoints DESC</small></div>';});
}
function closeMatchLB(){document.getElementById('match-lb-overlay').classList.remove('open');}

// ── TOURNAMENT LEADERBOARD ────────────────────────────────────────
function renderTournamentLB(){
  var el=document.getElementById('lb-list');
  el.innerHTML='<div class="empty-state"><span class="spinner"></span>Loading…</div>';
  db.collection('matchTeams').get().then(function(snap){
    var byUser={},names={},emails={};
    snap.forEach(function(doc){
      var t=doc.data();if(!t.uid) return;
      byUser[t.uid]=(byUser[t.uid]||0)+(t.totalPoints||0);
      names[t.uid]=t.ownerName||t.ownerEmail||t.uid;
      emails[t.uid]=t.ownerEmail||'';
    });
    var sorted=Object.keys(byUser).sort(function(a,b){return byUser[b]-byUser[a];});
    if(!sorted.length){el.innerHTML='<div class="empty-state">No teams yet — join a match contest first!</div>';return;}
    var medals=['🥇','🥈','🥉'],html='';
    sorted.forEach(function(uid,i){
      var isMe=uid===(currentUser&&currentUser.uid);
      html+='<div class="lb-row'+(i===0?' lb-row-gold':'')+'" '+(isMe?'style="border-color:rgba(0,201,167,.4);background:rgba(0,201,167,.04)"':'')+'>';
      html+='<div style="font-size:1.1rem;min-width:2rem;text-align:center">'+(medals[i]||i+1)+'</div>';
      html+='<div style="flex:1"><div style="font-weight:600;font-size:.95rem">'+names[uid]+(isMe?' <span style="font-size:.7rem;color:var(--teal)">(You)</span>':'')+'</div>';
      html+='<div style="font-size:.75rem;color:var(--muted)">'+emails[uid]+'</div></div>';
      html+='<div style="text-align:right"><div style="font-family:Rajdhani,sans-serif;font-size:1.4rem;font-weight:700;color:'+(i===0?'var(--gold)':'var(--text)')+'">'+byUser[uid].toLocaleString()+'</div>';
      html+='<div style="font-size:.7rem;color:var(--muted)">total pts</div></div></div>';
    });
    el.innerHTML=html;
  }).catch(function(e){el.innerHTML='<div style="color:var(--red);padding:1rem">Error: '+e.message+'</div>';});
}

// ── MY TEAMS ──────────────────────────────────────────────────────
function renderMyTeams(){
  var el=document.getElementById('myteams-list');
  var teams=Object.values(myMatchTeams);
  if(!teams.length){
    el.innerHTML='<div class="card" style="text-align:center;padding:2.5rem"><div style="font-size:1.1rem;font-weight:600;margin-bottom:.5rem">No teams yet</div><div style="color:var(--muted);font-size:.875rem;margin-bottom:1.5rem">Join a match contest to create your first team</div><button class="btn btn-gold" onclick="switchMainTab(\'matches\')">Browse Matches</button></div>';
    return;
  }
  var html='';
  teams.forEach(function(team){
    var match=matches.find(function(m){return m.id===team.matchId;});
    var pts=calcTeamPts(team.players,team.captain,team.viceCaptain,team.matchId);
    html+='<div class="card" style="margin-bottom:.875rem">';
    html+='<div style="display:flex;justify-content:space-between;align-items:flex-start">';
    html+='<div><div style="font-family:Rajdhani,sans-serif;font-size:1.15rem;font-weight:700">'+(team.teamName||'My Team')+'</div>';
    if(match) html+='<div style="font-size:.75rem;color:var(--muted);margin-top:2px">'+match.t1+' vs '+match.t2+(match.date?' · '+match.date:'')+'</div>';
    html+='</div><div style="text-align:right"><div style="font-family:Rajdhani,sans-serif;font-size:2rem;font-weight:700;color:var(--gold)">'+pts+'</div>';
    html+='<div style="font-size:.72rem;color:var(--muted)">pts</div></div></div>';
    // C/VC badges
    html+='<div style="display:flex;gap:.4rem;margin-top:.5rem">';
    if(team.captain) html+='<span style="font-size:.72rem;padding:2px 8px;border-radius:6px;background:rgba(240,180,41,.15);border:1px solid rgba(240,180,41,.3);color:var(--gold)">C: '+team.captain+'</span>';
    if(team.viceCaptain) html+='<span style="font-size:.72rem;padding:2px 8px;border-radius:6px;background:rgba(0,201,167,.1);border:1px solid rgba(0,201,167,.2);color:var(--teal)">VC: '+team.viceCaptain+'</span>';
    html+='</div>';
    // Points breakdown
    html+='<div style="margin-top:.75rem;border-top:1px solid var(--border);padding-top:.75rem">';
    var breakdown=(team.players||[]).map(function(p){
      var raw=getPlayerPts(p,team.matchId);
      var isCap=p===team.captain,isVC=p===team.viceCaptain;
      return{name:p,raw:raw,final:Math.round(raw*(isCap?2:isVC?1.5:1)),isCap:isCap,isVC:isVC};
    }).sort(function(a,b){return b.final-a.final;});
    breakdown.forEach(function(x){
      var badge=x.isCap?' <span style="font-size:.6rem;background:rgba(240,180,41,.2);padding:1px 4px;border-radius:4px;color:var(--gold)">C×2</span>':x.isVC?' <span style="font-size:.6rem;background:rgba(0,201,167,.15);padding:1px 4px;border-radius:4px;color:var(--teal)">VC×1.5</span>':'';
      html+='<div class="pts-row"><span>'+x.name+badge+'</span><span class="'+(x.final>0?'pts-pos':x.final<0?'pts-neg':'')+'">'+(x.final>0?'+':'')+x.final+'</span></div>';
    });
    html+='</div>';
    html+='<div style="display:flex;gap:.5rem;margin-top:.75rem">';
    if(match&&match.status==='upcoming') html+='<button class="btn btn-outline btn-sm" onclick="openPicker(\''+team.matchId+'\')" style="flex:1">✎ Edit Team</button>';
    html+='<button class="btn btn-outline btn-sm" onclick="openMatchLB(\''+team.matchId+'\')" style="flex:1">🏆 Match LB</button>';
    html+='</div></div>';
  });
  el.innerHTML=html;
}

// ── SQUADS ────────────────────────────────────────────────────────
function renderSquads(){
  var el=document.getElementById('squads-grid'),codes=Object.keys(SQUADS),html='';
  codes.forEach(function(code){
    var sq=SQUADS[code];
    html+='<div class="squad-card"><div style="display:flex;align-items:center;gap:.75rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)">';
    html+='<div style="width:12px;height:12px;border-radius:50%;background:'+sq.color+';flex-shrink:0"></div>';
    html+='<div><div style="font-family:Rajdhani,sans-serif;font-size:1.05rem;font-weight:600">'+sq.name+'</div>';
    html+='<div style="font-size:.75rem;color:var(--muted)">Captain: '+sq.captain+'</div></div></div>';
    html+='<div class="squad-pills">';
    sq.players.forEach(function(p){html+='<span class="squad-pill">'+p+'</span>';});
    html+='</div></div>';
  });
  el.innerHTML=html;
}

// ── EVENT LISTENERS ───────────────────────────────────────────────
document.getElementById('auth-btn').addEventListener('click',doAuth);
document.getElementById('auth-email').addEventListener('keydown',function(e){if(e.key==='Enter')doAuth();});
document.getElementById('auth-pass').addEventListener('keydown',function(e){if(e.key==='Enter')doAuth();});
document.getElementById('signout-btn').addEventListener('click',function(){auth.signOut();});
document.getElementById('refresh-btn').addEventListener('click',function(){countdown=900;fetchScores();});
document.getElementById('sc-close-btn').addEventListener('click',function(){document.getElementById('sc-overlay').classList.remove('open');});
document.getElementById('sc-overlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
document.getElementById('picker-overlay').addEventListener('click',function(e){if(e.target===this)closePicker();});
document.getElementById('match-lb-overlay').addEventListener('click',function(e){if(e.target===this)closeMatchLB();});
document.querySelectorAll('#main-tabs .tab').forEach(function(btn){btn.addEventListener('click',function(){switchMainTab(this.dataset.tab);});});
document.querySelectorAll('#match-filter-tabs .tab').forEach(function(btn){btn.addEventListener('click',function(){switchMatchFilter(this.dataset.filter);});});

// ── AUTH STATE ────────────────────────────────────────────────────
auth.onAuthStateChanged(function(user){
  currentUser=user;
  if(user){
    document.getElementById('nav-name').textContent=user.displayName||user.email.split('@')[0];
    showPage('app-page');
    loadMyMatchTeams(function(){startRefresh();renderSquads();renderMyTeams();});
  } else {
    showPage('auth-page');stopRefresh();
  }
});
</script>
