<style>
:root {
  --bg:#080c14; --bg2:#0d1420; --bg3:#121a2a;
  --card:#0f1928; --card2:#162135;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --gold:#f0b429; --gold2:#d99f1e;
  --teal:#00c9a7; --teal2:#00a88c;
  --red:#f05252; --green:#22c55e; --blue:#60a5fa;
  --text:#e8edf5; --muted:#6b7a99; --muted2:#4a5568;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; }

nav { background:rgba(13,20,32,0.97); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:0 1.5rem; display:flex; align-items:center; justify-content:space-between; height:64px; position:sticky; top:0; z-index:100; }
nav::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold),var(--teal),transparent); }
.logo { font-family:'Bebas Neue',sans-serif; display:flex; flex-direction:column; line-height:1; text-decoration:none; }
.logo-main { font-size:1.35rem; letter-spacing:3px; color:var(--gold); }
.logo-sub { font-size:0.68rem; letter-spacing:4px; color:var(--teal); font-family:'Inter',sans-serif; font-weight:300; }
.nav-right { display:flex; align-items:center; gap:0.75rem; }
.nav-user { font-size:0.8rem; color:var(--muted); }
.nav-user strong { color:var(--text); font-weight:500; }

.btn { padding:0.5rem 1.25rem; border-radius:8px; border:none; cursor:pointer; font-family:'Inter',sans-serif; font-size:0.875rem; font-weight:500; transition:all 0.2s; }
.btn-gold { background:var(--gold); color:#000; font-weight:600; }
.btn-gold:hover { background:var(--gold2); }
.btn-outline { background:transparent; border:1px solid var(--border2); color:var(--text); }
.btn-outline:hover { background:var(--bg3); border-color:var(--gold); color:var(--gold); }
.btn-sm { padding:0.3rem 0.85rem; font-size:0.78rem; }
.btn:disabled { opacity:0.4; cursor:not-allowed; }

.page { display:none; }
.page.active { display:block; }

#auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(240,180,41,0.08) 0%, transparent 70%), var(--bg); }
.auth-box { background:var(--card); border:1px solid var(--border2); border-radius:20px; padding:2.5rem; width:100%; max-width:420px; }
.auth-box h1 { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; color:var(--gold); text-align:center; letter-spacing:2px; margin-bottom:0.25rem; }
.auth-box p { text-align:center; color:var(--muted); font-size:0.875rem; margin-bottom:2rem; }
.auth-tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:1.5rem; }
.auth-tab { flex:1; padding:0.75rem; background:none; border:none; color:var(--muted); cursor:pointer; font-size:0.9rem; font-family:'Inter',sans-serif; transition:all 0.2s; }
.auth-tab.active { color:var(--gold); border-bottom:2px solid var(--gold); }
.form-group { margin-bottom:1rem; }
.form-group label { display:block; font-size:0.72rem; color:var(--muted); margin-bottom:0.4rem; text-transform:uppercase; letter-spacing:1px; font-weight:500; }
.form-group input { width:100%; background:var(--bg3); border:1px solid var(--border2); border-radius:10px; padding:0.7rem 1rem; color:var(--text); font-size:0.9rem; outline:none; transition:all 0.2s; font-family:'Inter',sans-serif; }
.form-group input:focus { border-color:var(--gold); }
.err-msg { border-radius:10px; padding:0.75rem; font-size:0.82rem; margin-bottom:1rem; display:none; border:1px solid rgba(240,82,82,0.3); background:rgba(240,82,82,0.08); color:var(--red); }

#app-page { min-height:100vh; }
.app-inner { max-width:1200px; margin:0 auto; padding:1.5rem; }

.tabs { display:flex; margin-bottom:2rem; border-bottom:1px solid var(--border); overflow-x:auto; }
.tab { padding:0.75rem 1.4rem; background:none; border:none; color:var(--muted); cursor:pointer; font-size:0.875rem; font-weight:500; border-bottom:2px solid transparent; transition:all 0.2s; margin-bottom:-1px; white-space:nowrap; font-family:'Inter',sans-serif; }
.tab:hover { color:var(--text); }
.tab.active { color:var(--gold); border-bottom-color:var(--gold); }

.card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:1.25rem; }
.card-title { font-family:'Rajdhani',sans-serif; font-size:1.1rem; font-weight:600; margin-bottom:1rem; color:var(--text); }

.match-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:1.25rem; margin-bottom:0.875rem; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; }
.match-card:hover { border-color:rgba(240,180,41,0.3); transform:translateY(-2px); background:var(--card2); }
.live-card { border-color:rgba(240,82,82,0.35) !important; }

.badge { font-size:10px; font-weight:600; padding:2px 8px; border-radius:20px; }
.b-live { background:rgba(240,82,82,0.15); color:var(--red); animation:pulse 1.8s infinite; }
.b-done { background:rgba(255,255,255,0.06); color:var(--muted); }
.b-up { background:rgba(96,165,250,0.12); color:var(--blue); }
.b-xi { background:rgba(34,197,94,0.12); color:var(--green); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

.lb-row { display:flex; align-items:center; gap:1rem; padding:0.9rem 1rem; background:var(--card); border:1px solid var(--border); border-radius:12px; margin-bottom:0.5rem; }
.lb-row:hover { background:var(--card2); }
.lb-row-gold { border-color:rgba(240,180,41,0.4); }

.player-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:0.5rem; margin-top:0.5rem; }
.player-btn { background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:0.5rem 0.75rem; color:var(--text); font-size:0.8rem; cursor:pointer; transition:all 0.15s; text-align:left; font-family:'Inter',sans-serif; }
.player-btn:hover { border-color:var(--gold); }
.player-btn.selected { background:rgba(240,180,41,0.12); border-color:var(--gold); color:var(--gold); font-weight:500; }
.player-btn:disabled { opacity:0.35; cursor:not-allowed; }

.squad-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1rem; }
.squad-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:1.25rem; }
.squad-pills { display:flex; flex-wrap:wrap; gap:4px; margin-top:0.75rem; }
.squad-pill { font-size:0.72rem; padding:2px 7px; border-radius:6px; background:var(--bg3); border:1px solid var(--border); color:var(--muted); }

.sc-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200; overflow-y:auto; padding:2rem 1rem; justify-content:center; }
.sc-overlay.open { display:flex; }
.sc-box { background:var(--card); border:1px solid var(--border2); border-radius:16px; padding:1.5rem; width:100%; max-width:700px; position:relative; align-self:flex-start; }
.sc-close { position:absolute; top:1rem; right:1rem; background:var(--bg3); border:none; color:var(--text); width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:1.1rem; }

.inn-title { font-family:'Rajdhani',sans-serif; font-size:0.95rem; font-weight:600; color:var(--muted); padding-bottom:0.3rem; border-bottom:1px solid var(--border); margin-bottom:0.5rem; display:flex; justify-content:space-between; }
table.sc-table { width:100%; border-collapse:collapse; font-size:12px; margin-bottom:1rem; }
.sc-table th { text-align:left; color:var(--muted); font-weight:400; padding:3px 4px; font-size:11px; border-bottom:1px solid var(--border); }
.sc-table td { padding:4px; }
.sc-table .r { text-align:right; }
.sc-table .hl { font-weight:600; }

.status-bar { display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap; }
.empty-state { text-align:center; padding:3rem; color:var(--muted); font-size:0.9rem; }
.spinner { width:18px; height:18px; border:2px solid var(--border2); border-top-color:var(--gold); border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; vertical-align:middle; margin-right:8px; }
@keyframes spin { to { transform:rotate(360deg); } }
.pts-row { display:flex; justify-content:space-between; align-items:center; padding:0.4rem 0; border-bottom:1px solid var(--border); font-size:0.82rem; }
.pts-row:last-child { border:none; }
.pts-pos { color:var(--green); font-weight:600; }
.pts-neg { color:var(--red); font-weight:600; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
@media(max-width:640px) { .grid-2 { grid-template-columns:1fr; } .player-grid { grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); } }
</style>
</head>

<!-- ── AUTH ── -->
<div id="auth-page" class="page active">
  <div class="auth-box">
    <h1>PACERS</h1>
    <p>Fantasy Cricket League — IPL 2026</p>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">Register</button>
    </div>
    <div id="err-msg" class="err-msg"></div>
    <div class="form-group">
      <label for="auth-email">Email</label>
      <input type="email" id="auth-email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label for="auth-pass">Password</label>
      <input type="password" id="auth-pass" placeholder="••••••••">
    </div>
    <div class="form-group" id="name-group" style="display:none">
      <label for="auth-name">Display Name</label>
      <input type="text" id="auth-name" placeholder="Your name">
    </div>
    <button class="btn btn-gold" id="auth-btn" style="width:100%;padding:0.75rem;font-size:1rem;">Sign In</button>
  </div>
</div>

<!-- ── APP ── -->
<div id="app-page" class="page">
  <nav>
    <a class="logo" href="#">
      <span class="logo-main">PACERS</span>
      <span class="logo-sub">Fantasy League</span>
    </a>
    <div class="nav-right">
      <span class="nav-user">Hi, <strong id="nav-name">—</strong></span>
      <button class="btn btn-outline btn-sm" id="signout-btn">Sign Out</button>
    </div>
  </nav>
  <div class="app-inner">
    <div class="status-bar">
      <span style="font-size:0.78rem;color:var(--muted)"><strong id="live-count">0</strong> live matches</span>
      <span style="font-size:0.78rem;color:var(--muted)" id="last-updated"></span>
      <span style="font-size:0.78rem;color:var(--teal);font-weight:500" id="refresh-countdown"></span>
      <button class="btn btn-outline btn-sm" style="margin-left:auto" id="refresh-btn">↺ Refresh</button>
    </div>
    <div class="tabs" id="main-tabs">
      <button class="tab active" data-tab="matches">Matches</button>
      <button class="tab" data-tab="leaderboard">Leaderboard</button>
      <button class="tab" data-tab="myteam">My Team</button>
      <button class="tab" data-tab="squads">Squads</button>
    </div>

    <div id="tab-matches">
      <div class="tabs" id="match-filter-tabs">
        <button class="tab active" data-filter="all">All</button>
        <button class="tab" data-filter="live">Live</button>
        <button class="tab" data-filter="completed">Results</button>
        <button class="tab" data-filter="upcoming">Upcoming</button>
      </div>
      <div id="matches-list"><div class="empty-state"><span class="spinner"></span>Loading…</div></div>
    </div>

    <div id="tab-leaderboard" style="display:none">
      <div id="lb-list"><div class="empty-state"><span class="spinner"></span>Loading…</div></div>
    </div>

    <div id="tab-myteam" style="display:none">
      <div id="myteam-view"></div>
    </div>

    <div id="tab-squads" style="display:none">
      <div class="squad-grid" id="squads-grid"></div>
    </div>
  </div>
</div>

  <div class="sc-box">
    <button class="sc-close" id="sc-close-btn">✕</button>
    <div id="sc-content"></div>
  </div>
</div>

var currentUser  = null;
var liveMatches  = [];

// ── HELPERS ───────────────────────────────────────────────────────
function normName(n) { return (n || "").toLowerCase().replace(/[^a-z]/g, ""); }

function teamColor(code) {
  if (SQUADS[code]) return SQUADS[code].color;
  var keys = Object.keys(SQUADS);
  for (var i = 0; i < keys.length; i++) {
    if (code && (SQUADS[keys[i]].name.indexOf(code) >= 0 || code.indexOf(keys[i]) >= 0))
      return SQUADS[keys[i]].color;
  }
  return "var(--text)";
}

function showErr(msg) {
  var el = document.getElementById("err-msg");
  el.textContent = msg;
  el.style.display = "block";
}

function showPage(pageId) {
  document.querySelectorAll(".page").forEach(function(p) { p.classList.remove("active"); });
  document.getElementById(pageId).classList.add("active");
}

// ── AUTH ──────────────────────────────────────────────────────────
function switchAuthTab(mode) {
  authMode = mode;
  document.getElementById("tab-login").classList.toggle("active", mode === "login");
  document.getElementById("tab-register").classList.toggle("active", mode === "register");
  document.getElementById("name-group").style.display = mode === "register" ? "block" : "none";
  document.getElementById("auth-btn").textContent = mode === "login" ? "Sign In" : "Create Account";
}

function doAuth() {
  var email = document.getElementById("auth-email").value.trim();
  var pass  = document.getElementById("auth-pass").value;
  var name  = document.getElementById("auth-name").value.trim();
  document.getElementById("err-msg").style.display = "none";

  if (!email) { showErr("Please enter your email"); return; }
  if (!pass)  { showErr("Please enter your password"); return; }

  var btn = document.getElementById("auth-btn");
  btn.disabled = true;
  btn.textContent = "Please wait…";

  var ERRORS = {
    "auth/user-not-found":       "No account found. Try Register.",
    "auth/wrong-password":       "Incorrect password.",
    "auth/invalid-email":        "Invalid email address.",
    "auth/invalid-credential":   "Email or password is incorrect.",
    "auth/too-many-requests":    "Too many attempts. Try again later.",
    "auth/network-request-failed":"Network error. Check your connection.",
    "auth/email-already-in-use": "Account exists. Try Sign In."
  };

  function onSuccess(user) {
    currentUser = user;
    btn.disabled = false;
    btn.textContent = authMode === "login" ? "Sign In" : "Create Account";
    document.getElementById("nav-name").textContent = user.displayName || user.email.split("@")[0];
    showPage("app-page");
    loadMyTeam(function() {
      startRefresh();
      renderSquads();
      renderMyTeam();
    });
  }

  function onError(e) {
    console.error("Auth error:", e.code, e.message);
    showErr(ERRORS[e.code] || e.message);
    btn.disabled = false;
    btn.textContent = authMode === "login" ? "Sign In" : "Create Account";
  }

  if (authMode === "login") {
    auth.signInWithEmailAndPassword(email, pass).then(function(cred) {
      onSuccess(cred.user);
    }).catch(onError);
  } else {
    if (!name) { showErr("Please enter a display name"); btn.disabled = false; btn.textContent = "Create Account"; return; }
    auth.createUserWithEmailAndPassword(email, pass).then(function(cred) {
      return cred.user.updateProfile({ displayName: name }).then(function() {
        return db.collection("users").doc(cred.user.uid).set({ name: name, email: email, createdAt: new Date().toISOString() });
      }).then(function() { onSuccess(cred.user); });
    }).catch(onError);
  }
}

// ── LIVE SCORES ───────────────────────────────────────────────────
function fetchScores() {
  fetch("/api/scores").then(function(r) {
    if (!r.ok) throw new Error(r.status);
    return r.json();
  }).then(function(d) {
    liveMatches = d.matches || [];
    document.getElementById("live-count").textContent = liveMatches.filter(function(m) { return m.status === "live"; }).length;
    document.getElementById("last-updated").textContent = "Updated " + new Date(d.fetchedAt || Date.now()).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
    updateAllPoints();
    if (activeTab === "matches")     renderMatches();
    if (activeTab === "leaderboard") renderLeaderboard();
    if (activeTab === "myteam")      renderMyTeam();
  }).catch(function(e) { console.warn("Score fetch:", e.message); });
}

function startRefresh() {
  stopRefresh();
  countdown = 60;
  fetchScores();
  timer = setInterval(function() {
    countdown--;
    var el = document.getElementById("refresh-countdown");
    if (el) el.textContent = "Auto-refresh in " + countdown + "s";
    if (countdown <= 0) { countdown = 60; fetchScores(); }
  }, 1000);
}

function stopRefresh() { clearInterval(timer); }

// ── FANTASY POINTS ────────────────────────────────────────────────
function getPlayerPoints(playerName) {
  var key = normName(playerName);
  var total = 0;
  for (var i = 0; i < liveMatches.length; i++) {
    if (liveMatches[i].playerPoints) total += liveMatches[i].playerPoints[key] || 0;
  }
  return Math.round(total);
}

function getTeamTotal(players) {
  var total = 0;
  for (var i = 0; i < (players || []).length; i++) total += getPlayerPoints(players[i]);
  return total;
}

function updateAllPoints() {
  if (!currentUser || !liveMatches.length) return;
  db.collection("teams").get().then(function(snap) {
    var batch = db.batch();
    var changed = 0;
    snap.forEach(function(doc) {
      var t = doc.data();
      var players = t.players || t.selectedPlayers || [];
      if (!players.length) return;
      var total = getTeamTotal(players);
      if (t.totalPoints !== total) {
        batch.update(doc.ref, { totalPoints: total, lastUpdated: new Date().toISOString(), liveNow: liveMatches.filter(function(m){ return m.status==="live"; }).length > 0 });
        changed++;
      }
    });
    if (changed) batch.commit().catch(function(e){ console.warn(e); });
  }).catch(function(e){ console.warn("Firestore:", e.message); });
}

// ── FIRESTORE TEAM ────────────────────────────────────────────────
function loadMyTeam(callback) {
  if (!currentUser) { if (callback) callback(); return; }
  db.collection("teams").doc(currentUser.uid).get().then(function(doc) {
    myTeam = doc.exists ? doc.data() : null;
    if (callback) callback();
  }).catch(function() { myTeam = null; if (callback) callback(); });
}

function saveMyTeam(name, players, callback) {
  if (!currentUser) return;
  var data = {
    teamName: name,
    ownerName: currentUser.displayName || currentUser.email,
    ownerEmail: currentUser.email,
    players: players,
    totalPoints: getTeamTotal(players),
    createdAt: myTeam && myTeam.createdAt ? myTeam.createdAt : new Date().toISOString(),
    lastUpdated: new Date().toISOString(),
    uid: currentUser.uid
  };
  db.collection("teams").doc(currentUser.uid).set(data).then(function() {
    myTeam = data;
    if (callback) callback();
  }).catch(function(e) { alert("Save failed: " + e.message); });
}

// ── TAB SWITCHING ─────────────────────────────────────────────────
function switchMainTab(tab) {
  activeTab = tab;
  ["matches","leaderboard","myteam","squads"].forEach(function(t) {
    document.getElementById("tab-" + t).style.display = t === tab ? "block" : "none";
  });
  document.querySelectorAll("#main-tabs .tab").forEach(function(btn) {
    btn.classList.toggle("active", btn.dataset.tab === tab);
  });
  if (tab === "matches")     renderMatches();
  if (tab === "leaderboard") renderLeaderboard();
  if (tab === "myteam")      renderMyTeam();
  if (tab === "squads")      renderSquads();
}

function switchMatchFilter(filter) {
  matchFilter = filter;
  document.querySelectorAll("#match-filter-tabs .tab").forEach(function(btn) {
    btn.classList.toggle("active", btn.dataset.filter === filter);
  });
  renderMatches();
}

// ── RENDER MATCHES ────────────────────────────────────────────────
function renderMatches() {
  var el = document.getElementById("matches-list");
  var list = liveMatches.filter(function(m) {
    return matchFilter === "all" || m.status === matchFilter;
  });
  if (!list.length) { el.innerHTML = '<div class="empty-state">No ' + matchFilter + ' matches.</div>'; return; }
  var html = "";
  for (var i = 0; i < list.length; i++) {
    var m   = list[i];
    var idx = liveMatches.indexOf(m);
    var up  = m.status === "upcoming";
    var badge = m.status === "live"
      ? '<span class="badge b-live">● LIVE</span>'
      : up ? '<span class="badge b-up">UPCOMING</span>'
           : '<span class="badge b-done">RESULT</span>';
    var xib = m.xi && m.xi.announced ? '<span class="badge b-xi" style="margin-left:4px">XI ✓</span>' : "";
    var c1 = teamColor(m.t1), c2 = teamColor(m.t2);
    html += '<div class="match-card ' + (m.status === "live" ? "live-card" : "") + '" onclick="openSc(' + idx + ')">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.6rem"><span style="font-size:0.72rem;color:var(--muted)">Match ' + (m.no || i+1) + ' · ' + (m.date || "") + ' · ' + (m.venue || "") + '</span><div>' + badge + xib + '</div></div>';
    html += '<div style="display:flex;align-items:center">';
    html += '<div style="flex:1"><div style="font-family:Rajdhani,sans-serif;font-weight:600;color:' + c1 + '">' + m.t1 + '</div>';
    if (!up) html += '<div style="font-size:1.5rem;font-weight:700;letter-spacing:-0.5px">' + (m.s1 || "—") + '</div><div style="font-size:0.72rem;color:var(--muted)">' + (m.o1 ? "(" + m.o1 + " ov)" : "") + '</div>';
    html += '</div><div style="color:var(--muted);font-size:0.75rem;padding:0 0.75rem">vs</div>';
    html += '<div style="flex:1;text-align:right"><div style="font-family:Rajdhani,sans-serif;font-weight:600;color:' + c2 + '">' + m.t2 + '</div>';
    if (!up) html += '<div style="font-size:1.5rem;font-weight:700;letter-spacing:-0.5px">' + (m.s2 || "—") + '</div><div style="font-size:0.72rem;color:var(--muted)">' + (m.o2 ? "(" + m.o2 + " ov)" : "") + '</div>';
    html += '</div></div>';
    if (m.result) html += '<div style="font-size:0.78rem;color:var(--muted);margin-top:0.5rem;padding-top:0.5rem;border-top:1px solid var(--border)">' + m.result + '</div>';
    if (m.toss)   html += '<div style="font-size:0.72rem;color:var(--muted2);margin-top:0.2rem">🪙 ' + m.toss + '</div>';
    html += '</div>';
  }
  el.innerHTML = html;
}

// ── SCORECARD ─────────────────────────────────────────────────────
function openSc(idx) {
  var m = liveMatches[idx];
  if (!m) return;
  var html = '<div style="margin-bottom:1rem"><div style="font-family:Rajdhani,sans-serif;font-size:1.15rem;font-weight:600">' + (m.f1 || m.t1) + ' vs ' + (m.f2 || m.t2) + '</div>';
  html += '<div style="font-size:0.78rem;color:var(--muted);margin-top:2px">' + (m.date || "") + ' · ' + (m.venue || "") + '</div>';
  if (m.result) html += '<div style="font-size:0.82rem;color:var(--teal);margin-top:4px">' + m.result + '</div>';
  html += '</div>';
  var inn = m.scorecard || [];
  if (!inn.length) { html += '<div style="color:var(--muted);padding:1rem 0">' + (m.status === "upcoming" ? "Match hasn\'t started yet." : "Scorecard loading…") + '</div>'; }
  for (var i = 0; i < inn.length; i++) {
    var inning = inn[i];
    html += '<div style="margin-bottom:1.25rem"><div class="inn-title"><span>' + (inning.inning || "Innings") + '</span><span>' + (inning.totalRuns || "") + '/' + (inning.totalWickets || "") + ' (' + (inning.totalOvers || "") + ' ov)</span></div>';
    html += '<table class="sc-table"><thead><tr><th>Batter</th><th>Dismissal</th><th class="r">R</th><th class="r">B</th><th class="r">4s</th><th class="r">6s</th><th class="r">SR</th></tr></thead><tbody>';
    var batting = inning.batting || [];
    for (var j = 0; j < batting.length; j++) {
      var b = batting[j];
      var sr = b.b > 0 ? ((b.r / b.b) * 100).toFixed(1) : "—";
      html += '<tr><td class="hl">' + (b.batsman && b.batsman.name ? b.batsman.name : (b.name || "")) + '</td><td style="color:var(--muted)">' + (b.dismissal || b.how_out || "not out") + '</td><td class="r hl">' + (b.r || 0) + '</td><td class="r">' + (b.b || 0) + '</td><td class="r">' + (b["4s"] || 0) + '</td><td class="r">' + (b["6s"] || 0) + '</td><td class="r">' + sr + '</td></tr>';
    }
    html += '</tbody></table>';
    html += '<table class="sc-table" style="margin-top:0.5rem"><thead><tr><th>Bowler</th><th class="r">O</th><th class="r">R</th><th class="r">W</th><th class="r">Econ</th></tr></thead><tbody>';
    var bowling = inning.bowling || [];
    for (var k = 0; k < bowling.length; k++) {
      var bw = bowling[k];
      var eco = bw.o > 0 ? (bw.r / bw.o).toFixed(2) : "—";
      html += '<tr><td class="hl">' + (bw.bowler && bw.bowler.name ? bw.bowler.name : (bw.name || "")) + '</td><td class="r">' + (bw.o || 0) + '</td><td class="r">' + (bw.r || 0) + '</td><td class="r hl">' + (bw.w || 0) + '</td><td class="r">' + eco + '</td></tr>';
    }
    html += '</tbody></table></div>';
  }
  if (m.xi && m.xi.announced) {
    html += '<div style="margin-top:1rem"><div style="font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:0.75rem">Playing XIs</div>';
    html += '<div class="grid-2"><div><div style="font-size:0.78rem;font-weight:600;margin-bottom:0.4rem;color:var(--muted)">' + (m.f1 || m.t1) + '</div>';
    for (var xi1 = 0; xi1 < (m.xi.t1 || []).length; xi1++) html += '<div style="font-size:0.78rem;padding:2px 0;border-bottom:1px solid var(--border)">' + (xi1+1) + '. ' + m.xi.t1[xi1] + '</div>';
    html += '</div><div><div style="font-size:0.78rem;font-weight:600;margin-bottom:0.4rem;color:var(--muted)">' + (m.f2 || m.t2) + '</div>';
    for (var xi2 = 0; xi2 < (m.xi.t2 || []).length; xi2++) html += '<div style="font-size:0.78rem;padding:2px 0;border-bottom:1px solid var(--border)">' + (xi2+1) + '. ' + m.xi.t2[xi2] + '</div>';
    html += '</div></div></div>';
  }
  document.getElementById("sc-content").innerHTML = html;
  document.getElementById("sc-overlay").classList.add("open");
}

// ── LEADERBOARD ───────────────────────────────────────────────────
function renderLeaderboard() {
  var el = document.getElementById("lb-list");
  el.innerHTML = '<div class="empty-state"><span class="spinner"></span>Loading…</div>';
  db.collection("teams").orderBy("totalPoints", "desc").limit(50).get().then(function(snap) {
    if (snap.empty) { el.innerHTML = '<div class="empty-state">No teams yet — create yours in My Team!</div>'; return; }
    var medals = ["🥇","🥈","🥉"];
    var html = "";
    snap.forEach(function(doc, i) {
      var t    = doc.data();
      var pts  = t.totalPoints || 0;
      var isMe = doc.id === (currentUser && currentUser.uid);
      html += '<div class="lb-row ' + (i === 0 ? "lb-row-gold" : "") + '" ' + (isMe ? 'style="border-color:rgba(0,201,167,0.4);background:rgba(0,201,167,0.04)"' : "") + '>';
      html += '<div style="font-size:1.1rem;min-width:2rem;text-align:center">' + (medals[i] || (i+1)) + '</div>';
      html += '<div style="flex:1"><div style="font-weight:600;font-size:0.95rem">' + (t.teamName || "Unnamed") + (isMe ? ' <span style="font-size:0.7rem;color:var(--teal)">(You)</span>' : "") + '</div>';
      html += '<div style="font-size:0.75rem;color:var(--muted)">' + (t.ownerName || t.ownerEmail || "") + '</div></div>';
      html += '<div style="text-align:right"><div style="font-family:Rajdhani,sans-serif;font-size:1.4rem;font-weight:700;color:' + (i === 0 ? "var(--gold)" : "var(--text)") + '">' + pts.toLocaleString() + '</div>';
      html += '<div style="font-size:0.7rem;color:' + (t.liveNow ? "var(--teal)" : "var(--muted)") + '">' + (t.liveNow ? "● live" : "") + ' pts</div></div></div>';
    });
    el.innerHTML = html;
  }).catch(function(e) { el.innerHTML = '<div style="color:var(--red);padding:1rem">Error: ' + e.message + '</div>'; });
}

// ── MY TEAM ───────────────────────────────────────────────────────
function renderMyTeam() {
  var el = document.getElementById("myteam-view");
  if (myTeam && myTeam.players && myTeam.players.length) {
    var total = getTeamTotal(myTeam.players);
    var breakdown = myTeam.players.map(function(p) { return { name: p, pts: getPlayerPoints(p) }; });
    breakdown.sort(function(a, b) { return b.pts - a.pts; });
    var html = '<div class="card" style="margin-bottom:1rem"><div style="display:flex;justify-content:space-between;align-items:flex-start">';
    html += '<div><div style="font-family:Rajdhani,sans-serif;font-size:1.4rem;font-weight:700">' + (myTeam.teamName || "My Team") + '</div>';
    html += '<div style="font-size:0.78rem;color:var(--muted);margin-top:2px">' + myTeam.players.length + ' players</div></div>';
    html += '<div style="text-align:right"><div style="font-family:Rajdhani,sans-serif;font-size:2rem;font-weight:700;color:var(--gold)">' + total.toLocaleString() + '</div>';
    html += '<div style="font-size:0.72rem;color:var(--muted)">total pts</div></div></div></div>';
    html += '<div class="card" style="margin-bottom:1rem"><div class="card-title">Player Points</div>';
    for (var i = 0; i < breakdown.length; i++) {
      html += '<div class="pts-row"><span>' + breakdown[i].name + '</span><span class="' + (breakdown[i].pts > 0 ? "pts-pos" : breakdown[i].pts < 0 ? "pts-neg" : "") + '">' + (breakdown[i].pts > 0 ? "+" : "") + breakdown[i].pts + '</span></div>';
    }
    html += '</div><button class="btn btn-outline" onclick="startPicker()" style="width:100%">✎ Change Team</button>';
    el.innerHTML = html;
  } else {
    el.innerHTML = '<div class="card" style="text-align:center;padding:2.5rem"><div style="font-size:1.1rem;font-weight:600;margin-bottom:0.5rem">No team yet</div><div style="color:var(--muted);font-size:0.875rem;margin-bottom:1.5rem">Pick 11 players and compete on the leaderboard</div><button class="btn btn-gold" onclick="startPicker()">Create My Team</button></div>';
  }
}

function startPicker() {
  pickerSel  = myTeam && myTeam.players ? myTeam.players.slice() : [];
  pickerName = myTeam && myTeam.teamName ? myTeam.teamName : "";
  renderPicker();
}

function togglePlayer(name) {
  var i = pickerSel.indexOf(name);
  if (i >= 0) pickerSel.splice(i, 1);
  else if (pickerSel.length < 11) pickerSel.push(name);
  renderPicker();
}

function savePicker() {
  var name = document.getElementById("picker-name-input").value.trim() || "My Team";
  if (pickerSel.length !== 11) return;
  saveMyTeam(name, pickerSel, function() {
    renderMyTeam();
    if (activeTab === "leaderboard") renderLeaderboard();
  });
}

function renderPicker() {
  var el  = document.getElementById("myteam-view");
  var sel = pickerSel;
  var html = '<div class="card" style="margin-bottom:1rem">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">';
  html += '<div class="card-title" style="margin:0">Select Your 11</div>';
  html += '<span style="font-size:0.82rem;color:' + (sel.length === 11 ? "var(--green)" : "var(--muted)") + '">' + sel.length + '/11</span></div>';
  html += '<div class="form-group" style="margin-bottom:0.75rem"><label>Team Name</label>';
  html += '<input type="text" id="picker-name-input" value="' + (pickerName || "").replace(/"/g, "&quot;") + '" placeholder="e.g. Super Squad" style="background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:0.6rem 1rem;color:var(--text);width:100%;outline:none;font-family:Inter,sans-serif"></div>';
  html += '<button class="btn btn-gold" style="width:100%" onclick="savePicker()" ' + (sel.length !== 11 ? "disabled" : "") + '>' + (sel.length === 11 ? "Save Team ✓" : "Select " + (11 - sel.length) + " more") + '</button></div>';
  var codes = Object.keys(SQUADS);
  for (var s = 0; s < codes.length; s++) {
    var code  = codes[s];
    var squad = SQUADS[code];
    html += '<div class="card" style="margin-bottom:0.75rem"><div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem">';
    html += '<div style="width:10px;height:10px;border-radius:50%;background:' + squad.color + ';flex-shrink:0"></div>';
    html += '<span style="font-family:Rajdhani,sans-serif;font-weight:600;font-size:0.95rem">' + squad.name + '</span></div>';
    html += '<div class="player-grid">';
    for (var p = 0; p < squad.players.length; p++) {
      var player = squad.players[p];
      var isSel  = sel.indexOf(player) >= 0;
      var pts    = getPlayerPoints(player);
      var dis    = !isSel && sel.length >= 11 ? "disabled" : "";
      html += '<button class="player-btn' + (isSel ? " selected" : "") + '" onclick="togglePlayer(\'' + player.replace(/'/g, "\\'") + '\')" ' + dis + '>';
      html += player;
      if (pts) html += '<span style="font-size:0.65rem;color:' + (isSel ? "var(--gold)" : "var(--muted)") + ';display:block">' + pts + ' pts</span>';
      html += '</button>';
    }
    html += '</div></div>';
  }
  el.innerHTML = html;
}

// ── SQUADS ────────────────────────────────────────────────────────
function renderSquads() {
  var el   = document.getElementById("squads-grid");
  var codes = Object.keys(SQUADS);
  var html = "";
  for (var i = 0; i < codes.length; i++) {
    var code  = codes[i];
    var squad = SQUADS[code];
    html += '<div class="squad-card"><div style="display:flex;align-items:center;gap:0.75rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border)">';
    html += '<div style="width:12px;height:12px;border-radius:50%;background:' + squad.color + ';flex-shrink:0"></div>';
    html += '<div><div style="font-family:Rajdhani,sans-serif;font-size:1.05rem;font-weight:600">' + squad.name + '</div>';
    html += '<div style="font-size:0.75rem;color:var(--muted)">Captain: ' + squad.captain + '</div></div></div>';
    html += '<div class="squad-pills">';
    for (var p = 0; p < squad.players.length; p++) html += '<span class="squad-pill">' + squad.players[p] + '</span>';
    html += '</div></div>';
  }
  el.innerHTML = html;
}

// ── EVENT LISTENERS ───────────────────────────────────────────────
document.getElementById("auth-btn").addEventListener("click", doAuth);
document.getElementById("auth-email").addEventListener("keydown", function(e) { if (e.key === "Enter") doAuth(); });
document.getElementById("auth-pass").addEventListener("keydown",  function(e) { if (e.key === "Enter") doAuth(); });
document.getElementById("signout-btn").addEventListener("click", function() { auth.signOut(); });
document.getElementById("refresh-btn").addEventListener("click", function() { countdown = 60; fetchScores(); });
document.getElementById("sc-close-btn").addEventListener("click", function() { document.getElementById("sc-overlay").classList.remove("open"); });
document.getElementById("sc-overlay").addEventListener("click", function(e) { if (e.target === this) this.classList.remove("open"); });

document.querySelectorAll("#main-tabs .tab").forEach(function(btn) {
  btn.addEventListener("click", function() { switchMainTab(this.dataset.tab); });
});
document.querySelectorAll("#match-filter-tabs .tab").forEach(function(btn) {
  btn.addEventListener("click", function() { switchMatchFilter(this.dataset.filter); });
});

// ── AUTH STATE ────────────────────────────────────────────────────
auth.onAuthStateChanged(function(user) {
  currentUser = user;
  if (user) {
    document.getElementById("nav-name").textContent = user.displayName || user.email.split("@")[0];
    showPage("app-page");
    loadMyTeam(function() { startRefresh(); renderSquads(); renderMyTeam(); });
  } else {
    showPage("auth-page");
    stopRefresh();
  }
});
</script>
